- type: entity
  abstract: true
  parent: BaseGameRule
  id: BaseXenomorphsRule
  components:
  - type: AntagObjectives
    objectives:
    - XenomorphSurviveObjective
  - type: XenomorphsRule
    xenomorphInfestationSound:
      collection: XenoStart
  - type: MaintsSpawnRule
  - type: AntagSpawner
    prototype: MobXenomorphLarva
  - type: AntagSelection
    agentName: xenomorph-round-end-agent-name

- type: entity
  parent: BaseXenomorphsRule
  id: XenomorphsInfestationRoundstart
  components:
  - type: GameRule
    minPlayers: 30
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - prefRoles: [ XenomorphsInfestationRoundstart ]
      spawnerPrototype: SpawnPointGhostXenomorph
      min: 4
      max: 4
      playerRatio: 15
      pickPlayer: true
      mindRoles:
      - MindRoleXenomorph
      briefing:
        text: xenomorph-role-greeting
        color: "#8c3986"
