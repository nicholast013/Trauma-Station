- type: entity
  parent: BaseAction
  id: ActionHereticFleshSurgery
  name: Knit Flesh
  description: A touch spell that allows you to either perform quick surgery or restore flesh of target.
  components:
  - type: Action
    useDelay: 1
    itemIconStyle: NoItem
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: flesh_surgery
    checkCanInteract: true
  - type: InstantAction
    event: !type:TouchSpellEvent
      touchSpell: TouchSpellFleshSurgery
      touchSpellWhitelist:
        components:
        - FleshSurgery
  - type: HereticAction
  - type: Tag
    tags:
    - SpellIgnoreForestAdmonitions

- type: entity
  parent: BaseAction
  id: ActionHereticFleshTransform
  name: Shed Form
  description: Shed your fragile form, become one with the arms, become one with the emperor. Instills intense fear in nearby mortals.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 10
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: final_hymn
  - type: InstantAction
    event: !type:PolymorphSpellEvent
      protoId: EldritchHorror
      loadActions: true
  - type: SpeakOnAction
    sentence: heretic-speech-flesh-worm
  - type: HereticAction

- type: entity
  parent: BaseAction
  id: ActionHereticFleshContract
  name: Force Contract
  description: Forces your body to contract onto a single tile.
  components:
  - type: Action
    checkCanInteract: false
    useDelay: 30
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Heretic/abilities_heretic.rsi
      state: worm_contract
  - type: InstantAction
    event: !type:TailedEntityForceContractEvent
